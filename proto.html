<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>Add to Home Screen</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="prompt" style="display: none;">
    <h3>To access the prototype:</h3>
    <p>Tap <strong>Share</strong> <span style="font-size: 1.5em;">&#x1F4E4;</span> then choose <strong>"Add to Home Screen"</strong></p>
  </div>

  <script>
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

    if (isStandalone) {
      window.location.href = "https://www.figma.com/proto/JB9ElfcdMOCryDUi6Xf3rg/MTR-Training-Module?page-id=0%3A1&node-id=2-1461&p=f&t=HglvcyeIhIYlHudv-0&scaling=scale-down&content-scaling=fixed&starting-point-node-id=2%3A1461&show-proto-sidebar=1";
    } else {
      document.getElementById('prompt').style.display = 'block';
    }
  </script>
</body>
</html>
