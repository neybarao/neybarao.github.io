name: Deploy to GitHub Pages

# Publishes the static site. Enable in repo Settings → Pages → Source: "GitHub Actions".
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (publishable files only)
        run: |
          mkdir -p _site
          cp index.html 404.html robots.txt sitemap.xml site.webmanifest _site/
          cp -r assets work _site/
          # Preserve the custom domain on every deploy
          [ -f CNAME ] && cp CNAME _site/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
